name: Deploy Registry

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [devnote-published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Generate DevNote index
        run: python generate-index.py
        env:
          GITHUB_TOKEN: ${{ secrets.DEVNOTES_READ_TOKEN }}

      - name: Print index summary
        run: |
          python -c "
          import json
          data = json.load(open('devnotes-index.json'))
          print(f'Found {len(data)} DevNotes')
          for d in data:
            print(f'  - {d[\"title\"]}')
          "

      - name: Commit devnotes-index.json
        run: |
          git config user.name "nucleus-bot"
          git config user.email "build@bnext.bio"
          git add devnotes-index.json
          git diff --cached --quiet || git commit -m "index: regenerate devnotes-index.json"
          git pull --rebase
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Build registry site
        run: myst build --html
        env:
          BASE_URL: /devnotes-registry

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
